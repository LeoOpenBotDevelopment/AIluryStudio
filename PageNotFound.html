<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; 
            font-family: 'Nunito', sans-serif; 
            text-align: center;
        }
        h1 {
            font-size: 14rem; 
            margin: 0;
            font-weight: 800;
            color: #d8dee6; 
            letter-spacing: -2px;
            line-height: 1;
        }
        p {
            font-size: 0.9rem;
            color: #94a3b8; 
            margin-top: -10px; 
            letter-spacing: 0.5px;
            max-width: 450px;
            padding: 0 50px;
        }
        @media (max-width: 700px) {
            h1 {
                font-size: 9rem;
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>The file you are looking for could not be found. Check for typos in the file path.</p>
    </div>
</body>
</html>
